name: Generate spec & notify frontend

# 觸發時機:
#  1. PR 被 merge 到 main(真實情境)
#  2. workflow_dispatch —— 手動測
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # 要把重新產生的 openapi.yaml commit 回 repo

jobs:
  spec:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: 從程式碼產生 OpenAPI 合約(mvn test 跑 OpenApiExportTest)
        run: mvn -B -ntp test

      - name: 合約有變更就 commit 回 repo
        id: spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- openapi.yaml; then
            echo "spec 有變更,commit 回 main"
            git add openapi.yaml
            git commit -m "chore(openapi): regenerate spec [skip ci]"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "spec 無變更"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: 送 repository_dispatch 給前端 repo
        env:
          # FE_DISPATCH_TOKEN = fine-grained PAT,授權 api-fe-test 的 Contents: write
          GH_TOKEN: ${{ secrets.FE_DISPATCH_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.spec.outputs.sha }}
          CHANGED: ${{ steps.spec.outputs.changed }}
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
        run: |
          cat > payload.json <<EOF
          {
            "event_type": "backend-api-updated",
            "client_payload": {
              "repo": "$REPO",
              "sha": "$SHA",
              "ref": "main",
              "spec_path": "openapi.yaml",
              "spec_changed": "$CHANGED",
              "pr_number": $PR_NUMBER
            }
          }
          EOF
          echo "--- dispatch payload ---"
          cat payload.json
          curl -sS --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/s930415/api-fe-test/dispatches \
            -d @payload.json
          echo "✅ dispatch 已送出(HTTP 204 = 成功)"
