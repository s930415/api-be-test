name: Notify frontend on API change

# Thin caller —— 實際邏輯在 s930415/be2fe-actions（reusable workflow）。
# on: push —— 每次 push(任一分支)就重產 spec + commit 回該分支(給前端 check 抓最新);
#             合約真的變了才 dispatch(引擎內已 gate),避免洗版。
on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  notify:
    permissions:
      contents: write
    uses: s930415/be2fe-actions/.github/workflows/be-notify-frontend.yml@v2
    with:
      frontend-repo: s930415/api-fe-test
    secrets:
      dispatch-token: ${{ secrets.FE_DISPATCH_TOKEN }}
